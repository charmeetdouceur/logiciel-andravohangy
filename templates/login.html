<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Connexion — Christina</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
<style>
body{background:linear-gradient(135deg,#0D1B3E 0%,#1a2d5a 50%,#243870 100%);min-height:100vh;display:flex;align-items:center;justify-content:center;}
.login-card{background:rgba(255,255,255,0.97);border-radius:20px;padding:40px;width:100%;max-width:400px;box-shadow:0 20px 60px rgba(0,0,0,0.4);}
.logo{text-align:center;margin-bottom:30px;}
.logo-icon{font-size:50px;margin-bottom:10px;}
.logo h2{font-weight:800;color:#0D1B3E;margin:0;}
.logo p{color:#666;font-size:13px;margin:4px 0 0;}
.form-control{border-radius:10px;border:2px solid #e0e0e0;padding:12px 16px;font-size:14px;}
.form-control:focus{border-color:#F57C00;box-shadow:0 0 0 3px rgba(245,124,0,0.15);}
.btn-login{background:linear-gradient(135deg,#F57C00,#FF9800);border:none;border-radius:10px;padding:12px;font-size:15px;font-weight:700;width:100%;color:#fff;}
.btn-login:hover{background:linear-gradient(135deg,#E65100,#F57C00);color:#fff;}
.alert-danger{border-radius:10px;font-size:13px;}
</style>
</head>
<body>
<div class="login-card">
  <div class="logo">
    <div class="logo-icon">🚚</div>
    <h2>Livraison Andravohangy</h2>
    <p>Tableau Christina — Accès protégé</p>
  </div>
  {% if error %}<div class="alert alert-danger"><i class="fas fa-exclamation-triangle me-2"></i>{{error}}</div>{% endif %}
  <form method="POST">
    <div class="mb-3">
      <label class="form-label fw-bold text-muted small">MOT DE PASSE</label>
      <div class="input-group">
        <span class="input-group-text" style="border-radius:10px 0 0 10px;border:2px solid #e0e0e0;border-right:none;"><i class="fas fa-lock text-muted"></i></span>
        <input type="password" name="password" class="form-control" placeholder="Entrez votre mot de passe" autofocus style="border-radius:0 10px 10px 0;border-left:none;">
      </div>
    </div>
    <button type="submit" class="btn-login mt-2"><i class="fas fa-sign-in-alt me-2"></i>Se connecter</button>
  </form>
</div>
</body>
</html>
